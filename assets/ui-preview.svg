<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Inference X-Ray concept preview</title>
  <desc id="desc">Concept preview of the app: sidebar module navigation, prompt box, sampling controls, response panel, nine-stage pipeline with self-attention highlighted, and live metrics</desc>
  <rect width="1200" height="700" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1200" height="700" fill="none" stroke="#E5E5E0" stroke-width="1"/>
  <line x1="0" y1="75" x2="1200" y2="75" stroke="#E5E5E0" stroke-width="1"/>

  <circle cx="42" cy="42" r="12" fill="none" stroke="#0F6E56" stroke-width="2"/>
  <text x="66" y="47" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#18181B">Inference X-Ray</text>
  <text x="66" y="64" font-family="Arial, sans-serif" font-size="11" fill="#71717A">See inside LLM inference</text>
  <circle cx="990" cy="43" r="4" fill="#1D9E75"/>
  <text x="1180" y="47" font-family="Arial, sans-serif" font-size="12" fill="#3F3F46" text-anchor="end">gemma-2b-it &#183; local</text>

  <rect x="1000" y="12" width="180" height="22" rx="11" fill="#E1F5EE"/>
  <text x="1090" y="27" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0F6E56" text-anchor="middle">CONCEPT PREVIEW</text>

  <text x="30" y="97" font-family="Arial, sans-serif" font-size="10" letter-spacing="1" fill="#A1A1AA">LEARN</text>
  <rect x="20" y="106" width="170" height="24" rx="6" fill="#F5F5F4"/>
  <text x="32" y="122" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56" font-weight="700">Overview</text>
  <text x="32" y="150" font-family="Arial, sans-serif" font-size="12" fill="#3F3F46">Tokenizer</text>
  <text x="32" y="176" font-family="Arial, sans-serif" font-size="12" fill="#3F3F46">Prompt</text>
  <text x="32" y="202" font-family="Arial, sans-serif" font-size="12" fill="#3F3F46">Sampling</text>
  <text x="32" y="228" font-family="Arial, sans-serif" font-size="12" fill="#3F3F46">Streaming</text>
  <text x="32" y="254" font-family="Arial, sans-serif" font-size="12" fill="#3F3F46">KV Cache</text>
  <text x="32" y="280" font-family="Arial, sans-serif" font-size="12" fill="#3F3F46">Attention</text>
  <text x="32" y="306" font-family="Arial, sans-serif" font-size="12" fill="#3F3F46">Dashboard</text>
  <text x="32" y="332" font-family="Arial, sans-serif" font-size="12" fill="#3F3F46">Model Comparison</text>
  <text x="30" y="365" font-family="Arial, sans-serif" font-size="10" letter-spacing="1" fill="#A1A1AA">PIPELINE</text>
  <text x="32" y="385" font-family="Arial, sans-serif" font-size="12" fill="#A1A1AA">Full pipeline (soon)</text>

  <rect x="220" y="90" width="960" height="62" rx="8" fill="#FFFFFF" stroke="#D4D4D0"/>
  <text x="242" y="127" font-family="Arial, sans-serif" font-size="15" fill="#18181B">Why is the sky blue?</text>
  <rect x="1080" y="105" width="90" height="32" rx="6" fill="#18181B"/>
  <text x="1125" y="126" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Generate</text>

  <text x="242" y="178" font-family="Arial, sans-serif" font-size="12" fill="#71717A">temperature</text>
  <line x1="345" y1="175" x2="980" y2="175" stroke="#E5E5E0" stroke-width="4"/>
  <line x1="345" y1="175" x2="790" y2="175" stroke="#1D9E75" stroke-width="4"/>
  <circle cx="790" cy="175" r="6" fill="#18181B"/>
  <text x="1000" y="179" font-family="Arial, sans-serif" font-size="12" fill="#18181B">0.70</text>

  <text x="242" y="205" font-family="Arial, sans-serif" font-size="12" fill="#71717A">top-p</text>
  <line x1="345" y1="202" x2="980" y2="202" stroke="#E5E5E0" stroke-width="4"/>
  <line x1="345" y1="202" x2="920" y2="202" stroke="#1D9E75" stroke-width="4"/>
  <circle cx="920" cy="202" r="6" fill="#18181B"/>
  <text x="1000" y="206" font-family="Arial, sans-serif" font-size="12" fill="#18181B">0.90</text>

  <rect x="220" y="232" width="960" height="100" rx="8" fill="#F5F5F4" stroke="#D4D4D0"/>
  <text x="242" y="254" font-family="Arial, sans-serif" font-size="11" letter-spacing="1" fill="#71717A">RESPONSE</text>
  <circle cx="1082" cy="251" r="3" fill="#1D9E75"/>
  <text x="1090" y="255" font-family="Arial, sans-serif" font-size="11" fill="#0F6E56">streaming</text>
  <text x="242" y="278" font-family="Arial, sans-serif" font-size="13" fill="#3F3F46">The sky appears blue because of a phenomenon called Rayleigh scattering.</text>
  <text x="242" y="298" font-family="Arial, sans-serif" font-size="13" fill="#3F3F46">Shorter wavelengths of light are scattered more than longer ones...</text>
  <text x="242" y="320" font-family="Arial, sans-serif" font-size="11" fill="#A1A1AA">~90 tokens &#183; ~30 tok/sec</text>

  <line x1="242" y1="375" x2="1158" y2="375" stroke="#E5E5E0" stroke-width="2"/>
  <g font-family="Arial, sans-serif">
    <circle cx="242" cy="375" r="12" fill="#F5F5F4" stroke="#D4D4D0"/>
    <text x="270" y="405" font-size="10" fill="#A1A1AA" text-anchor="middle">Prompt</text>
    <circle cx="357" cy="375" r="12" fill="#F5F5F4" stroke="#D4D4D0"/>
    <text x="357" y="405" font-size="10" fill="#A1A1AA" text-anchor="middle">Tokens</text>
    <circle cx="472" cy="375" r="12" fill="#F5F5F4" stroke="#D4D4D0"/>
    <text x="472" y="405" font-size="10" fill="#A1A1AA" text-anchor="middle">Embed</text>
    <circle cx="587" cy="375" r="12" fill="#F5F5F4" stroke="#D4D4D0"/>
    <text x="587" y="405" font-size="10" fill="#A1A1AA" text-anchor="middle">Layers</text>
    <circle cx="702" cy="375" r="15" fill="#1D9E75"/>
    <text x="702" y="380" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
    <text x="702" y="405" font-size="10" font-weight="700" fill="#0F6E56" text-anchor="middle">Attention</text>
    <circle cx="817" cy="375" r="12" fill="#FFFFFF" stroke="#D4D4D0" stroke-dasharray="2 2"/>
    <text x="817" y="405" font-size="10" fill="#A1A1AA" text-anchor="middle">KV Cache</text>
    <circle cx="932" cy="375" r="12" fill="#FFFFFF" stroke="#D4D4D0" stroke-dasharray="2 2"/>
    <text x="932" y="405" font-size="10" fill="#A1A1AA" text-anchor="middle">Logits</text>
    <circle cx="1047" cy="375" r="12" fill="#FFFFFF" stroke="#D4D4D0" stroke-dasharray="2 2"/>
    <text x="1047" y="405" font-size="10" fill="#A1A1AA" text-anchor="middle">Sample</text>
    <circle cx="1158" cy="375" r="12" fill="#FFFFFF" stroke="#D4D4D0" stroke-dasharray="2 2"/>
    <text x="1158" y="405" font-size="10" fill="#A1A1AA" text-anchor="middle">Token</text>
  </g>

  <rect x="220" y="425" width="960" height="145" rx="8" fill="#E1F5EE" stroke="#1D9E75"/>
  <text x="242" y="452" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#04342C">Self-attention</text>
  <rect x="345" y="438" width="100" height="18" rx="4" fill="#9FE1CB"/>
  <text x="395" y="451" font-family="Arial, sans-serif" font-size="10" fill="#04342C" text-anchor="middle">layer 12 of 18</text>
  <g>
    <rect x="242" y="466" width="16" height="16" fill="#0F6E56"/><rect x="261" y="466" width="16" height="16" fill="#FFFFFF"/><rect x="280" y="466" width="16" height="16" fill="#FFFFFF"/><rect x="299" y="466" width="16" height="16" fill="#FFFFFF"/><rect x="318" y="466" width="16" height="16" fill="#FFFFFF"/><rect x="337" y="466" width="16" height="16" fill="#FFFFFF"/>
    <rect x="242" y="485" width="16" height="16" fill="#1D9E75"/><rect x="261" y="485" width="16" height="16" fill="#0F6E56"/><rect x="280" y="485" width="16" height="16" fill="#FFFFFF"/><rect x="299" y="485" width="16" height="16" fill="#FFFFFF"/><rect x="318" y="485" width="16" height="16" fill="#FFFFFF"/><rect x="337" y="485" width="16" height="16" fill="#FFFFFF"/>
    <rect x="242" y="504" width="16" height="16" fill="#5DCAA5"/><rect x="261" y="504" width="16" height="16" fill="#1D9E75"/><rect x="280" y="504" width="16" height="16" fill="#0F6E56"/><rect x="299" y="504" width="16" height="16" fill="#FFFFFF"/><rect x="318" y="504" width="16" height="16" fill="#FFFFFF"/><rect x="337" y="504" width="16" height="16" fill="#FFFFFF"/>
  </g>
  <text x="242" y="548" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">Each token looks at every earlier token to decide what matters for the next prediction.</text>

  <g font-family="Arial, sans-serif">
    <rect x="220" y="600" width="230" height="65" rx="8" fill="#F5F5F4"/>
    <text x="240" y="622" font-size="10" fill="#71717A">input tokens</text>
    <text x="240" y="646" font-size="18" font-weight="700" fill="#18181B">~7</text>

    <rect x="465" y="600" width="230" height="65" rx="8" fill="#F5F5F4"/>
    <text x="485" y="622" font-size="10" fill="#71717A">tokens / sec</text>
    <text x="485" y="646" font-size="18" font-weight="700" fill="#18181B">~30</text>

    <rect x="710" y="600" width="230" height="65" rx="8" fill="#F5F5F4"/>
    <text x="730" y="622" font-size="10" fill="#71717A">gpu memory</text>
    <text x="730" y="646" font-size="18" font-weight="700" fill="#18181B">~3 GB</text>

    <rect x="950" y="600" width="230" height="65" rx="8" fill="#F5F5F4"/>
    <text x="970" y="622" font-size="10" fill="#71717A">context</text>
    <text x="970" y="646" font-size="18" font-weight="700" fill="#18181B">256/8192</text>
  </g>
</svg>
